#!/usr/bin/env python3
"""
纳指抄底模型 - 自动数据更新脚本
每日美股收盘后自动拉取最新数据并更新网站
"""

import pandas as pd
import numpy as np
import json
import math
from datetime import datetime
import warnings
warnings.filterwarnings('ignore')

try:
    import yfinance as yf
except ImportError:
    print("❌ 请先安装 yfinance: pip install yfinance")
    raise

def fetch_latest_data():
    """从Yahoo Finance获取最新数据"""
    print("📥 正在获取最新数据...")
    
    try:
        # 获取纳指数据 (^IXIC)
        print("   获取纳斯达克指数...")
        nasdaq = yf.Ticker("^IXIC")
        nasdaq_hist = nasdaq.history(period="3y")
        
        if nasdaq_hist.empty:
            raise Exception("无法获取纳指数据")
        
        # 获取VIX数据 (^VIX)
        print("   获取VIX恐慌指数...")
        vix = yf.Ticker("^VIX")
        vix_hist = vix.history(period="3y")
        
        if vix_hist.empty:
            raise Exception("无法获取VIX数据")
        
        # 合并数据
        df = pd.DataFrame({
            'Date': [d.date() for d in nasdaq_hist.index],
            'Close': nasdaq_hist['Close'].values,
            'Volume': nasdaq_hist['Volume'].values
        })
        
        vix_df = pd.DataFrame({
            'Date': [d.date() for d in vix_hist.index],
            'VIX': vix_hist['Close'].values
        })
        
        df = pd.merge(df, vix_df, on='Date', how='inner')
        df = df.sort_values('Date').reset_index(drop=True)
        
        print(f"✅ 获取到 {len(df)} 条数据")
        print(f"   数据范围: {df['Date'].min()} 至 {df['Date'].max()}")
        
        return df
        
    except Exception as e:
        print(f"❌ 获取数据失败: {e}")
        raise

def calculate_indicators(df):
    """计算技术指标"""
    print("📊 计算技术指标...")
    
    # 移动平均线
    df['MA20'] = df['Close'].rolling(window=20).mean()
    df['MA50'] = df['Close'].rolling(window=50).mean()
    df['MA200'] = df['Close'].rolling(window=200).mean()
    df['MA500'] = df['Close'].rolling(window=500).mean()
    
    # 估值分位 (价格/500日均线)
    df['Valuation'] = df['Close'] / df['MA500']
    
    # VIX指标
    df['VIX_MA20'] = df['VIX'].rolling(window=20).mean()
    df['VIX_Spike'] = df['VIX'] / df['VIX_MA20']
    
    # RSI计算
    delta = df['Close'].diff()
    gain = (delta.where(delta > 0, 0)).rolling(window=14).mean()
    loss = (-delta.where(delta < 0, 0)).rolling(window=14).mean()
    rs = gain / loss
    df['RSI'] = 100 - (100 / (1 + rs))
    
    # 价格偏离 (相对于50日均线)
    df['Price_Deviation'] = (df['Close'] - df['MA50']) / df['MA50']
    
    # 每日涨跌幅
    df['Daily_Return'] = df['Close'].pct_change() * 100
    
    print("✅ 技术指标计算完成")
    return df

def calculate_signals(df):
    """计算买卖信号"""
    print("🎯 计算买卖信号...")
    
    # ========== 买入评分 ==========
    # VIX评分 (最高30分)
    df['Buy_Score_VIX'] = np.where(
        df['VIX'] > 40, 30,
        np.where(df['VIX'] > 32, 26,
        np.where(df['VIX'] > 26, 20,
        np.where(df['VIX'] > 22, 10, 0)))
    )
    
    # VIX激增评分 (最高20分)
    df['Buy_Score_VIXSpike'] = np.where(
        df['VIX_Spike'] > 2.0, 20,
        np.where(df['VIX_Spike'] > 1.5, 15,
        np.where(df['VIX_Spike'] > 1.2, 8,
        np.where(df['VIX_Spike'] > 1.0, 3, 0)))
    )
    
    # RSI超卖评分 (最高25分)
    df['Buy_Score_RSI'] = np.where(
        df['RSI'] < 25, 25,
        np.where(df['RSI'] < 30, 20,
        np.where(df['RSI'] < 35, 15,
        np.where(df['RSI'] < 40, 8, 0)))
    )
    
    # 估值评分 (最高15分)
    df['Buy_Score_Valuation'] = np.where(
        df['Valuation'] < 0.90, 15,
        np.where(df['Valuation'] < 0.95, 10,
        np.where(df['Valuation'] < 1.0, 5, 0))
    )
    
    # 价格偏离评分 (最高10分)
    df['Buy_Score_Deviation'] = np.where(
        df['Price_Deviation'] < -0.08, 10,
        np.where(df['Price_Deviation'] < -0.05, 6,
        np.where(df['Price_Deviation'] < -0.03, 3, 0))
    )
    
    # 买入总分
    df['Buy_Score'] = (df['Buy_Score_VIX'] + 
                      df['Buy_Score_VIXSpike'] + 
                      df['Buy_Score_RSI'] + 
                      df['Buy_Score_Valuation'] + 
                      df['Buy_Score_Deviation'])
    
    # 买入信号：评分≥60 或 (VIX≥26且RSI<30)
    df['Buy_Signal'] = (df['Buy_Score'] >= 60) | ((df['VIX'] >= 26) & (df['RSI'] < 30))
    
    # ========== 卖出评分 ==========
    # RSI超买评分
    df['Sell_Score_RSI'] = np.where(
        df['RSI'] > 78, 35,
        np.where(df['RSI'] > 72, 28,
        np.where(df['RSI'] > 68, 15, 0))
    )
    
    # 估值高位评分
    df['Sell_Score_Valuation'] = np.where(
        df['Valuation'] > 1.18, 30,
        np.where(df['Valuation'] > 1.12, 18,
        np.where(df['Valuation'] > 1.06, 6, 0))
    )
    
    # VIX低位评分
    df['Sell_Score_VIXLow'] = np.where(
        df['VIX'] < 14, 20,
        np.where(df['VIX'] < 16, 10, 0)
    )
    
    # 价格偏离评分
    df['Sell_Score_Deviation'] = np.where(
        df['Price_Deviation'] > 0.12, 15,
        np.where(df['Price_Deviation'] > 0.08, 6, 0)
    )
    
    # 卖出总分
    df['Sell_Score'] = (df['Sell_Score_RSI'] + 
                       df['Sell_Score_Valuation'] + 
                       df['Sell_Score_VIXLow'] + 
                       df['Sell_Score_Deviation'])
    
    # 卖出信号：评分≥50
    df['Sell_Signal'] = df['Sell_Score'] >= 50
    
    print("✅ 买卖信号计算完成")
    return df

def prepare_web_data(df):
    """准备网站数据"""
    print("📝 准备网站数据...")
    
    selected_cols = ['Date', 'Close', 'VIX', 'RSI', 'Valuation', 'Price_Deviation', 
                     'Buy_Score', 'Sell_Score', 'Buy_Signal', 'Sell_Signal', 'Daily_Return']
    
    clean_data = []
    for _, row in df[selected_cols].iterrows():
        clean_row = {}
        for col in selected_cols:
            value = row[col]
            if isinstance(value, float) and (math.isnan(value) or math.isinf(value)):
                clean_row[col.lower()] = None
            elif hasattr(value, 'isoformat'):
                clean_row[col.lower()] = str(value)
            elif col in ['Buy_Signal', 'Sell_Signal']:
                clean_row[col.lower().replace('_', '_')] = bool(value)
            else:
                clean_row[col.lower()] = value
        clean_data.append(clean_row)
    
    return clean_data

