                <button class="nav-btn" id="nextBtn" onclick="nextDay()">▶</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📊 市场数据</div>
            <div id="resultArea">
                <div style="color:#888;padding:20px;text-align:center;">加载中...</div>
            </div>
