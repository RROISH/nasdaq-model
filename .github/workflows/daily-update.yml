        <div class="card">
            <div class="card-title">📜 历史买卖信号 (点击查询)</div>
            <div class="signal-list" id="signalList"></div>
        </div>

        <div class="card">
            <div class="card-title">📖 模型说明</div>
            <div class="section">
                <div class="section-title">买入条件 (满足任一)</div>
                <div class="section-content">
                    <span class="highlight">评分 ≥ 60分</span> 或 <span class="highlight">VIX≥26且RSI<30</span><br><br>
                    • VIX>40(30分) >32(26分) >26(20分)<br>
                    • RSI<25(25分) <30(20分) <35(15分)<br>
                    • 估值<0.90(15分) <0.95(10分)<br>
                    • 价格偏离<-8%(10分)
                </div>
            </div>
            <div class="section">
                <div class="section-title">卖出条件</div>
                <div class="section-content">
                    <span class="highlight">评分 ≥ 50分</span><br><br>
                    • RSI>78(35分) >72(28分)<br>
                    • 估值>1.18(30分) >1.12(18分)<br>
                    • VIX<14(20分)<br>
                    • 价格偏离>12%(15分)
                </div>
            </div>
        </div>

        <footer>
            <p>数据来源: Yahoo Finance | 更新: {update_time}</p>
            <p>仅供参考，不构成投资建议</p>
        </footer>
    </div>

    <script>
        const historyData = {js_data};
        let currentIndex = historyData.length - 1;
        
        function init() {{
            const dateInput = document.getElementById('dateInput');
            dateInput.min = historyData[0].date;
            dateInput.max = historyData[historyData.length - 1].date;
            updateDateDisplay();
            showResult(historyData[currentIndex]);
            showSignals();
        }}
        
        function updateDateDisplay() {{
            const data = historyData[currentIndex];
            document.getElementById('dateDisplay').textContent = data.date;
            document.getElementById('dateInput').value = data.date;
            document.getElementById('prevBtn').disabled = (currentIndex <= 0);
            document.getElementById('nextBtn').disabled = (currentIndex >= historyData.length - 1);
        }}
        
        function prevDay() {{
            if (currentIndex > 0) {{
                currentIndex--;
                updateDateDisplay();
                showResult(historyData[currentIndex]);
            }}
        }}
        
        function nextDay() {{
            if (currentIndex < historyData.length - 1) {{
                currentIndex++;
                updateDateDisplay();
                showResult(historyData[currentIndex]);
            }}
        }}
        
        function openDatePicker() {{
            const dateInput = document.getElementById('dateInput');
            if (dateInput.showPicker) {{
                dateInput.showPicker();
            }} else {{
                dateInput.click();
            }}
        }}
        
        function onDateChange() {{
            const selectedDate = document.getElementById('dateInput').value;
            const index = historyData.findIndex(d => d.date === selectedDate);
            if (index !== -1) {{
                currentIndex = index;
                updateDateDisplay();
                showResult(historyData[currentIndex]);
            }}
        }}
        
        function showResult(data) {{
            const change = data.daily_return || 0;
            const changeClass = change >= 0 ? 'up' : 'down';
            
            const html = `
                <div class="status-grid">
                    <div class="status-item">
                        <div class="label">纳指</div>
                        <div class="value">${{data.close ? data.close.toFixed(0) : '--'}}</div>
                        <div class="sub ${{changeClass}}">${{(change >= 0 ? '+' : '') + change.toFixed(2)}}%</div>
                    </div>
                    <div class="status-item">
                        <div class="label">VIX</div>
                        <div class="value">${{data.vix ? data.vix.toFixed(1) : '--'}}</div>
                        <div class="sub">${{getVixText(data.vix)}}</div>
                    </div>
                    <div class="status-item">
                        <div class="label">RSI</div>
                        <div class="value">${{data.rsi ? data.rsi.toFixed(0) : '--'}}</div>
                        <div class="sub">${{getRsiText(data.rsi)}}</div>
                    </div>
                    <div class="status-item">
                        <div class="label">估值</div>
                        <div class="value">${{data.valuation ? data.valuation.toFixed(2) : '--'}}</div>
                        <div class="sub">${{getValText(data.valuation)}}</div>
                    </div>
                </div>
                ${{getSignalHtml(data)}}
                <div style="margin-top:12px;">
                    <div class="score-row">
                        <div class="score-label"><span>买入评分</span><span>${{data.buy_score}}/100</span></div>
                        <div class="score-bar"><div class="score-fill ${{data.buy_score>=60?'score-green':data.buy_score>=35?'score-yellow':'score-red'}}" style="width:${{Math.min(data.buy_score,100)}}%"></div></div>
                    </div>
                    <div class="score-row">
                        <div class="score-label"><span>卖出评分</span><span>${{data.sell_score}}/100</span></div>
                        <div class="score-bar"><div class="score-fill ${{data.sell_score>=50?'score-green':data.sell_score>=30?'score-yellow':'score-red'}}" style="width:${{Math.min(data.sell_score,100)}}%"></div></div>
                    </div>
                </div>
            `;
            document.getElementById('resultArea').innerHTML = html;
        }}
        
        function getSignalHtml(data) {{
            if (data.buy_signal) {{
                return `<div class="signal-box signal-buy">📥 买入信号 (评分${{data.buy_score}})</div>`;
            }} else if (data.sell_signal) {{
                return `<div class="signal-box signal-sell">📤 卖出信号 (评分${{data.sell_score}})</div>`;
            }} else {{
                return `<div class="signal-box signal-neutral">⏳ 观望 (买${{data.buy_score}}/卖${{data.sell_score}})</div>`;
            }}
        }}
        
        function getVixText(vix) {{
            if (!vix) return '--';
            if (vix > 35) return '极度恐慌';
            if (vix > 26) return '恐慌';
            if (vix < 14) return '乐观';
            return '正常';
        }}
        
        function getRsiText(rsi) {{
            if (!rsi) return '--';
            if (rsi > 70) return '超买';
            if (rsi < 30) return '超卖';
            return '中性';
        }}
        
        function getValText(val) {{
            if (!val) return '--';
            if (val > 1.12) return '高估';
            if (val < 0.93) return '低估';
            return '中性';
        }}
        
        function showSignals() {{
            const buySignals = historyData.filter(d => d.buy_signal).reverse().slice(0, 15);
            const sellSignals = historyData.filter(d => d.sell_signal).reverse().slice(0, 5);
            
            let html = '';
            
            if (buySignals.length > 0) {{
                html += '<div style="font-size:0.85em;color:#666;margin-bottom:8px;">买入信号</div>';
                buySignals.forEach(s => {{
                    html += `
                        <div class="signal-item" onclick="selectSignalDate('${{s.date}}')">
                            <div class="date">📥 ${{s.date}}</div>
                            <div class="info">纳指${{s.close.toFixed(0)}} | VIX ${{s.vix.toFixed(1)}} | 评分${{s.buy_score}}</div>
                        </div>
                    `;
                }});
            }}
            
            if (sellSignals.length > 0) {{
                html += '<div style="font-size:0.85em;color:#666;margin:12px 0 8px;">卖出信号</div>';
                sellSignals.forEach(s => {{
                    html += `
                        <div class="signal-item sell" onclick="selectSignalDate('${{s.date}}')">
                            <div class="date">📤 ${{s.date}}</div>
                            <div class="info">纳指${{s.close.toFixed(0)}} | VIX ${{s.vix.toFixed(1)}} | 评分${{s.sell_score}}</div>
                        </div>
                    `;
                }});
            }}
            
            document.getElementById('signalList').innerHTML = html || '<div style="color:#888;padding:10px;">无历史信号</div>';
        }}
        
        function selectSignalDate(date) {{
            const index = historyData.findIndex(d => d.date === date);
            if (index !== -1) {{
                currentIndex = index;
                updateDateDisplay();
                showResult(historyData[currentIndex]);
                window.scrollTo({{ top: 0, behavior: 'smooth' }});
            }}
        }}
        
        init();
    </script>
</body>
</html>'''
    
    return html_content

def main():
    """主函数"""
    print("=" * 60)
    print("📈 纳指抄底模型 - 数据更新")
    print("=" * 60)
    
    try:
        # 1. 获取最新数据
        df = fetch_latest_data()
        
        # 2. 计算指标
        df = calculate_indicators(df)
        
        # 3. 计算信号
        df = calculate_signals(df)
        
        # 4. 准备网站数据
        web_data = prepare_web_data(df)
        
        # 5. 生成HTML
        update_time = datetime.now().strftime('%Y-%m-%d')
        html = generate_html(web_data, update_time)
        
        # 6. 保存文件
        with open('index.html', 'w', encoding='utf-8') as f:
            f.write(html)
        
        print("\n" + "=" * 60)
        print("✅ 更新完成！")
        print("=" * 60)
        
        # 显示最新状态
        latest = df.iloc[-1]
        print(f"\n📊 最新状态 ({latest['Date']}):")
        print(f"   纳指: {latest['Close']:.0f} ({latest['Daily_Return']:+.2f}%)")
        print(f"   VIX: {latest['VIX']:.1f}")
        print(f"   RSI: {latest['RSI']:.1f}")
        print(f"   买入评分: {latest['Buy_Score']}")
        print(f"   卖出评分: {latest['Sell_Score']}")
        
        if latest['Buy_Signal']:
            print(f"   信号: 📥 买入")
        elif latest['Sell_Signal']:
            print(f"   信号: 📤 卖出")
        else:
            print(f"   信号: ⏳ 观望")
        
        # 统计
        print(f"\n📈 统计:")
        print(f"   总数据: {len(df)} 天")
        print(f"   买入信号: {df['Buy_Signal'].sum()} 次")
        print(f"   卖出信号: {df['Sell_Signal'].sum()} 次")
        
        return True
        
    except Exception as e:
        print(f"\n❌ 更新失败: {e}")
        return False

if __name__ == '__main__':
    success = main()
    exit(0 if success else 1)
