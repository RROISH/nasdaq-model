<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>纳指加仓模型</title>
<style>
:root {
    --bg: #0f1419; --card: #1a2332; --text: #e0e6ed; 
    --green: #00d084; --red: #ff4757; --yellow: #ffa502; --orange: #ff7f50;
    --blue: #3742fa; --gray: #57606f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    line-height:1.6; padding-bottom: 40px;
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
header { text-align:center; padding: 20px 0; border-bottom: 1px solid var(--card); margin-bottom: 16px; }
header h1 { font-size: 24px; letter-spacing: 2px; }
header p { color: var(--gray); font-size: 12px; margin-top: 4px; }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 14px; color: var(--gray); margin-bottom: 12px; display:flex; align-items:center; gap:6px; }

.price-main { text-align:center; padding: 10px 0; }
.price-num { font-size: 48px; font-weight: 700; letter-spacing: -1px; }
.price-change { font-size: 18px; margin-top: 4px; }
.price-up { color: var(--green); } .price-down { color: var(--red); }

.risk-badge { 
    display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
    margin-top: 10px;
}
.risk-high { background: rgba(255,71,87,0.2); color: var(--red); border: 1px solid var(--red); }
.risk-mid { background: rgba(255,127,80,0.2); color: var(--orange); border: 1px solid var(--orange); }
.risk-low { background: rgba(255,165,2,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
.risk-min { background: rgba(0,208,132,0.2); color: var(--green); border: 1px solid var(--green); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-item { text-align: center; padding: 12px 4px; background: rgba(255,255,255,0.03); border-radius: 12px; }
.stat-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; white-space:nowrap; }
.stat-value { font-size: 18px; font-weight: 700; }

.action-box { 
    padding: 16px; border-radius: 12px; border-left: 4px solid; margin-top: 12px;
    background: rgba(255,255,255,0.02);
}
.action-stop { border-color: var(--red); }
.action-warn { border-color: var(--orange); }
.action-ok { border-color: var(--green); }
.action-text { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.action-sub { font-size: 13px; color: var(--gray); }

.history-list { max-height: 350px; overflow-y: auto; }
.history-item { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.history-item:last-child { border-bottom: none; }
.history-date { font-size: 13px; color: var(--gray); }
.history-info { text-align: right; }
.history-price { font-weight: 600; font-size: 15px; }
.history-tag { 
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px;
}
.tag-batch1 { background: var(--green); color: #000; }
.tag-batch2 { background: var(--yellow); color: #000; }
.tag-batch3 { background: var(--orange); color: #fff; }
.tag-batch4 { background: var(--red); color: #fff; }

.divider { height: 1px; background: var(--card); margin: 16px 0; }
.loading { text-align: center; padding: 40px; color: var(--gray); }
.footer { text-align: center; padding: 20px; font-size: 11px; color: var(--gray); }

.alert-bar {
    padding: 14px; border-radius: 12px; margin-bottom: 16px; text-align: center;
}
.alert-wait { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); }
.alert-ready { background: rgba(0,208,132,0.1); border: 1px solid rgba(0,208,132,0.3); }
.alert-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.alert-desc { font-size: 13px; color: var(--gray); }

.update-info { text-align: center; font-size: 11px; color: var(--gray); margin-top: 8px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>纳指加仓模型</h1>
        <p>长期持有 · 只抄底 · 不卖出</p>
    </header>

    <div id="loading" class="loading">正在获取市场数据...</div>
    <div id="content" style="display:none;">
        
        <div id="alertBar" class="alert-bar"></div>

        <div class="card">
            <div class="card-title">📊 纳斯达克综合指数</div>
            <div class="price-main">
                <div id="currentPrice" class="price-num">--</div>
                <div id="priceChange" class="price-change">--</div>
                <div id="riskBadge" class="risk-badge"></div>
            </div>
            <div class="divider"></div>
            <div class="grid-2">
                <div class="stat-item">
                    <div class="stat-label">1年高点回撤</div>
                    <div id="statDD" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">RSI(14)</div>
                    <div id="statRSI" class="stat-value">--</div>
                </div>
            </div>
            <div class="grid-3" style="margin-top:10px;">
                <div class="stat-item">
                    <div class="stat-label">20日涨幅</div>
                    <div id="stat20D" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">估值百分位</div>
                    <div id="statPercentile" class="stat-value">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">VIX恐慌指数</div>
                    <div id="statVIX" class="stat-value">--</div>
                </div>
            </div>
            <div class="update-info" id="updateInfo"></div>
        </div>

        <div class="card">
            <div class="card-title">🎯 新增资金操作建议</div>
            <div id="actionBox" class="action-box">
                <div id="actionText" class="action-text">--</div>
                <div id="actionSub" class="action-sub">--</div>
            </div>
            <div style="margin-top:12px; font-size:13px; color:var(--gray);">
                <div id="nextBuyInfo">--</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 近1年加仓记录</div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="footer">
        数据仅供参考，不构成投资建议 · VIX为真实恐慌指数<br>
        模型规则：回撤≥10%/15%/20%/25% 分4批加仓 · 不卖出 · 长期持有
    </div>
</div>

<script>
const CONFIG = {
    initialDD: -10,
    stepDD: -5,
    maxBatch: 4,
    rsiPeriod: 14,
    lookback: 252
};

let modelData = null;

// ==================== 风险等级判断 ====================
function getRiskLevel(dd, rsi, change20d, vix) {
    if (rsi > 80 || dd > -5 || change20d > 8) return { level: 'high', text: '🔴 高风险', class: 'risk-high' };
    if (rsi > 70 || dd > -10 || change20d > 5) return { level: 'mid', text: '🟠 中风险', class: 'risk-mid' };
    if (rsi > 50 || dd > -15) return { level: 'low', text: '🟡 低风险', class: 'risk-low' };
    return { level: 'min', text: '🟢 极低风险', class: 'risk-min' };
}

// ==================== 渲染页面 ====================
function render() {
    if (!modelData || !modelData.price_data || modelData.price_data.length < 30) {
        document.getElementById('loading').textContent = '数据不足，请刷新重试';
        return;
    }
    
    const current = modelData.current;
    const priceData = modelData.price_data;
    const last = priceData[priceData.length - 1];
    
    const change1d = current.change_1d;
    const dd = current.drawdown;
    const rsi = current.rsi;
    const change20d = current.change_20d;
    const percentile = current.percentile;
    const vix = current.vix;
    const risk = getRiskLevel(dd, rsi, change20d, vix);
    
    // 价格
    document.getElementById('currentPrice').textContent = current.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const changeEl = document.getElementById('priceChange');
    changeEl.textContent = (change1d >= 0 ? '+' : '') + change1d.toFixed(2) + '%';
    changeEl.className = 'price-change ' + (change1d >= 0 ? 'price-up' : 'price-down');
    
    // 风险标签
    const badge = document.getElementById('riskBadge');
    badge.textContent = risk.text;
    badge.className = 'risk-badge ' + risk.class;
    
    // 指标
    document.getElementById('statDD').textContent = dd.toFixed(1) + '%';
    document.getElementById('statDD').style.color = dd <= -10 ? 'var(--green)' : (dd <= -5 ? 'var(--yellow)' : 'var(--red)');
    
    document.getElementById('statRSI').textContent = rsi.toFixed(1);
    document.getElementById('statRSI').style.color = rsi > 80 ? 'var(--red)' : (rsi > 70 ? 'var(--orange)' : 'var(--text)');
    
    document.getElementById('stat20D').textContent = (change20d >= 0 ? '+' : '') + change20d.toFixed(1) + '%';
    document.getElementById('stat20D').style.color = change20d > 8 ? 'var(--red)' : (change20d > 5 ? 'var(--orange)' : 'var(--text)');
    
    document.getElementById('statPercentile').textContent = percentile.toFixed(0) + '%';
    document.getElementById('statPercentile').style.color = percentile > 90 ? 'var(--red)' : (percentile > 70 ? 'var(--orange)' : 'var(--green)');
    
    document.getElementById('statVIX').textContent = vix.toFixed(1);
    document.getElementById('statVIX').style.color = vix > 25 ? 'var(--red)' : (vix > 15 ? 'var(--orange)' : 'var(--green)');
    
    // 更新时间
    if (modelData.update_time) {
        document.getElementById('updateInfo').textContent = '更新时间: ' + modelData.update_time;
    }
    
    // 操作建议
    const actionBox = document.getElementById('actionBox');
    const actionText = document.getElementById('actionText');
    const actionSub = document.getElementById('actionSub');
    const nextBuyInfo = document.getElementById('nextBuyInfo');
    
    if (risk.level === 'high') {
        actionBox.className = 'action-box action-stop';
        actionText.textContent = '❌ 停止买入';
        actionSub.textContent = '市场过热，新增资金严禁入场，耐心等待回调';
    } else if (risk.level === 'mid') {
        actionBox.className = 'action-box action-warn';
        actionText.textContent = '⏸️ 暂停加仓';
        actionSub.textContent = '位置偏高，建议观望，不急于进场';
    } else if (risk.level === 'low') {
        actionBox.className = 'action-box action-ok';
        actionText.textContent = '✅ 可以首仓';
        actionSub.textContent = '回撤达10%，可建首批仓位';
    } else {
        actionBox.className = 'action-box action-ok';
        actionText.textContent = '🚀 全力抄底';
        actionSub.textContent = '深度回调，建议分批重仓';
    }
    
    // 下一批加仓信息
    const levels = [CONFIG.initialDD, CONFIG.initialDD + CONFIG.stepDD, CONFIG.initialDD + CONFIG.stepDD*2, CONFIG.initialDD + CONFIG.stepDD*3];
    let nextInfo = '';
    for (let i = 0; i < levels.length; i++) {
        if (dd > levels[i]) {
            const need = (dd - levels[i]).toFixed(1);
            const targetPrice = (current.high_252 * (1 + levels[i]/100)).toFixed(0);
            nextInfo = `距离第${i+1}批加仓（回撤${levels[i]}%）还需跌 ${need}%（约${targetPrice}点）`;
            break;
        }
    }
    if (!nextInfo) nextInfo = '当前处于加仓区间，建议按批次执行';
    nextBuyInfo.textContent = nextInfo;
    
    // 警告栏
    const alertBar = document.getElementById('alertBar');
    if (dd <= CONFIG.initialDD) {
        alertBar.className = 'alert-bar alert-ready';
        alertBar.innerHTML = '<div class="alert-title">🚀 加仓信号已触发</div><div class="alert-desc">当前回撤达 ' + dd.toFixed(1) + '%，建议执行第1批买入</div>';
    } else {
        alertBar.className = 'alert-bar alert-wait';
        const dist = (dd - CONFIG.initialDD).toFixed(1);
        alertBar.innerHTML = '<div class="alert-title">⏳ 等待加仓信号</div><div class="alert-desc">距离首仓触发（回撤10%）还需跌 ' + dist + '%</div>';
    }
    
    // 加仓记录（只显示近1年）
    const signals = modelData.signals || [];
    const historyList = document.getElementById('historyList');
    
    if (signals.length === 0) {
        historyList.innerHTML = '<div style="text-align:center; color:var(--gray); padding:20px;">近1年无加仓记录</div>';
    } else {
        historyList.innerHTML = signals.slice().reverse().map(c => {
            const avgCost = c.batches.reduce((s,b) => s+b.price, 0) / c.batches.length;
            const endP = c.end_price || current.price;
            const profit = ((endP / avgCost - 1) * 100).toFixed(1);
            const status = c.end_date ? `已结束 (+${profit}%)` : `<span style="color:var(--green)">持仓中 (+${profit}%)</span>`;
            const tags = c.batches.map(b => `<span class="history-tag tag-batch${b.batch}">${b.batch}批</span>`).join('');
            return `<div class="history-item">
                <div>
                    <div style="font-weight:600;">${c.start_date} ${tags}</div>
                    <div class="history-date">${c.batches.length}批买入 成本:${avgCost.toFixed(0)} 最低回撤:${c.lowest_dd.toFixed(1)}%</div>
                </div>
                <div class="history-info">
                    <div class="history-price">${status}</div>
                    <div class="history-date">${c.end_date || '至今'}</div>
                </div>
            </div>`;
        }).join('');
    }
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

// ==================== 数据获取 ====================

// 从本地JSON文件加载
async function loadLocalJson() {
    try {
        const response = await fetch('model_data.json?t=' + Date.now());
        if (response.ok) {
            const data = await response.json();
            if (data && data.price_data && data.price_data.length > 0) {
                modelData = data;
                console.log('本地数据加载成功:', data.price_data.length, '条');
                return true;
            }
        }
    } catch(e) {
        console.log('本地JSON加载失败:', e);
    }
    return false;
}

// 从Yahoo Finance获取（通过CORS代理）
async function fetchFromYahoo() {
    const proxies = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    
    // 获取纳斯达克历史
    async function fetchNDX(proxyIndex) {
        if (proxyIndex >= proxies.length) throw new Error('所有代理均失败');
        const url = proxies[proxyIndex] + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EIXIC?interval=1d&range=1y');
        try {
            const r = await fetch(url);
            const data = await r.json();
            if (data.chart && data.chart.result && data.chart.result[0]) {
                return data.chart.result[0];
            }
            throw new Error('invalid data');
        } catch(e) {
            if (proxyIndex + 1 < proxies.length) return fetchNDX(proxyIndex + 1);
            throw e;
        }
    }
    
    // 获取VIX历史
    async function fetchVIX(proxyIndex) {
        if (proxyIndex >= proxies.length) throw new Error('所有代理均失败');
        const url = proxies[proxyIndex] + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=1y');
        try {
            const r = await fetch(url);
            const data = await r.json();
            if (data.chart && data.chart.result && data.chart.result[0]) {
                return data.chart.result[0];
            }
            throw new Error('invalid data');
        } catch(e) {
            if (proxyIndex + 1 < proxies.length) return fetchVIX(proxyIndex + 1);
            throw e;
        }
    }
    
    const [ndxResult, vixResult] = await Promise.all([
        fetchNDX(0).catch(() => null),
        fetchVIX(0).catch(() => null)
    ]);
    
    if (!ndxResult) throw new Error('无法获取纳斯达克数据');
    
    // 处理数据
    const ndxTimestamps = ndxResult.timestamp;
    const ndxCloses = ndxResult.indicators.quote[0].close;
    
    const vixDict = {};
    if (vixResult) {
        const vixTimestamps = vixResult.timestamp;
        const vixCloses = vixResult.indicators.quote[0].close;
        for (let i = 0; i < vixTimestamps.length; i++) {
            if (vixCloses[i] !== null) {
                const date = new Date(vixTimestamps[i] * 1000).toISOString().split('T')[0];
                vixDict[date] = vixCloses[i];
            }
        }
    }
    
    // 生成价格数据
    const priceData = [];
    for (let i = 0; i < ndxTimestamps.length; i++) {
        if (ndxCloses[i] !== null) {
            const date = new Date(ndxTimestamps[i] * 1000).toISOString().split('T')[0];
            priceData.push({
                date: date,
                close: ndxCloses[i]
            });
        }
    }
    
    // 计算指标
    const closePrices = priceData.map(d => d.close);
    const lookback = Math.min(252, closePrices.length);
    
    // 回撤
    let high252 = 0;
    for (let i = 0; i < priceData.length; i++) {
        const windowStart = Math.max(0, i - lookback + 1);
        const window = closePrices.slice(windowStart, i + 1);
        high252 = Math.max(...window);
        priceData[i].dd = (closePrices[i] / high252 - 1) * 100;
    }
    
    // RSI
    for (let i = 0; i < priceData.length; i++) {
        if (i < 14) {
            priceData[i].rsi = 50;
        } else {
            let gains = 0, losses = 0;
            for (let j = i - 13; j <= i; j++) {
                const change = closePrices[j] - closePrices[j-1];
                if (change > 0) gains += change;
                else losses -= change;
            }
            const avgGain = gains / 14;
            const avgLoss = losses / 14;
            if (avgLoss === 0) priceData[i].rsi = 100;
            else {
                const rs = avgGain / avgLoss;
                priceData[i].rsi = 100 - (100 / (1 + rs));
            }
        }
    }
    
    // VIX
    for (let i = 0; i < priceData.length; i++) {
        priceData[i].vix = vixDict[priceData[i].date] || 20;
    }
    
    // 估值百分位
    for (let i = 0; i < priceData.length; i++) {
        if (i < 30) {
            priceData[i].percentile = 50;
        } else {
            const windowStart = Math.max(0, i - lookback + 1);
            const window = closePrices.slice(windowStart, i + 1);
            let rank = 0;
            for (let j = 0; j < window.length; j++) {
                if (window[j] <= closePrices[i]) rank++;
            }
            priceData[i].percentile = (rank / window.length) * 100;
        }
    }
    
    // 当前指标
    const last = priceData[priceData.length - 1];
    const prev = priceData[priceData.length - 2] || last;
    const change20d = priceData.length >= 21 ? (last.close / priceData[priceData.length - 21].close - 1) * 100 : 0;
    
    // 生成信号
    const signals = generateSignals(priceData);
    
    modelData = {
        current: {
            date: last.date,
            price: last.close,
            prev_price: prev.close,
            change_1d: (last.close / prev.close - 1) * 100,
            drawdown: last.dd,
            rsi: last.rsi,
            change_20d: change20d,
            percentile: last.percentile,
            vix: last.vix,
            high_252: high252
        },
        price_data: priceData,
        signals: signals,
        update_time: new Date().toLocaleString('zh-CN')
    };
    
    return true;
}

// 生成信号（客户端版本）
function generateSignals(priceData) {
    const signals = [];
    let inPosition = false;
    let currentSignal = null;
    
    for (let i = 0; i < priceData.length; i++) {
        const row = priceData[i];
        const dd = row.dd;
        
        if (!inPosition && dd <= CONFIG.initialDD) {
            inPosition = true;
            currentSignal = {
                start_date: row.date,
                start_price: row.close,
                start_dd: dd,
                batches: [{batch: 1, price: row.close, dd: dd, date: row.date}],
                next_threshold: CONFIG.initialDD + CONFIG.stepDD,
                lowest_dd: dd
            };
        } else if (inPosition) {
            if (dd < currentSignal.lowest_dd) currentSignal.lowest_dd = dd;
            
            const batchCount = currentSignal.batches.length;
            if (batchCount < CONFIG.maxBatch && dd <= currentSignal.next_threshold) {
                currentSignal.batches.push({
                    batch: batchCount + 1,
                    price: row.close,
                    dd: dd,
                    date: row.date
                });
                currentSignal.next_threshold += CONFIG.stepDD;
            }
            
            if (dd > -3) {
                const daysHeld = (new Date(row.date) - new Date(currentSignal.start_date)) / 86400000;
                if (daysHeld > 30) {
                    currentSignal.end_date = row.date;
                    currentSignal.end_price = row.close;
                    signals.push(currentSignal);
                    inPosition = false;
                    currentSignal = null;
                }
            }
        }
    }
    
    if (inPosition && currentSignal) {
        signals.push(currentSignal);
    }
    
    return signals;
}

// ==================== 主流程 ====================
async function init() {
    // 先尝试加载本地JSON
    const hasLocal = await loadLocalJson();
    
    if (!hasLocal) {
        // 尝试从Yahoo获取
        try {
            await fetchFromYahoo();
            console.log('Yahoo数据获取成功');
        } catch(e) {
            console.log('Yahoo数据获取失败:', e);
            document.getElementById('loading').innerHTML = 
                '<div style="padding:20px;">' +
                '<p>⚠️ 数据获取失败</p>' +
                '<p style="font-size:13px; margin-top:10px;">请确保 model_data.json 文件存在，或检查网络连接</p>' +
                '<p style="font-size:12px; margin-top:10px; color:#666;">错误: ' + e.message + '</p>' +
                '</div>';
            return;
        }
    }
    
    render();
}

init();
setInterval(init, 300000);
</script>
</body>
</html>
