<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>纳指加仓模型</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e1a;color:#f3f4f6;line-height:1.6;padding-bottom:20px}
.c{max-width:100%;padding:12px}
.h{text-align:center;padding:12px 0;border-bottom:1px solid #374151;margin-bottom:12px}
.h h1{font-size:20px;background:linear-gradient(135deg,#00d9ff,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h p{color:#9ca3af;font-size:12px}
.st{text-align:center;padding:6px;font-size:12px;color:#9ca3af;margin-bottom:10px}
.st .o{color:#ef4444}.st .k{color:#10b981}.st .l{color:#00d9ff}
.ds{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;padding:10px;background:#1f2937;border-radius:12px;border:1px solid #374151}
.nb{width:36px;height:36px;border-radius:8px;border:1px solid #374151;background:#111827;color:#f3f4f6;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent}
.nb:active{background:#374151;transform:scale(.95)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.dw{position:relative;flex:1;max-width:180px}
.dw input{width:100%;padding:8px;border-radius:8px;border:1px solid #374151;background:#111827;color:#f3f4f6;font-size:14px;text-align:center;cursor:pointer;outline:none}
.dw input::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer;position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.di{text-align:center;color:#9ca3af;font-size:11px;margin-bottom:6px}
.cd{background:#1f2937;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #374151}
.cp{text-align:center;padding:12px 0 6px}
.pv{font-size:40px;font-weight:700;background:linear-gradient(135deg,#f3f4f6,#00d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pl{color:#9ca3af;font-size:12px;margin-top:4px}
.pc{font-size:13px;margin-top:6px;font-weight:600}
.rc{text-align:center;padding:12px;border-radius:10px;margin-top:12px;font-weight:700;font-size:15px}
.r0{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.r1{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.r2{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.4)}
.r3{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.rh{background:rgba(156,163,175,.1);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}
.sr{margin-top:12px;padding:12px;background:#111827;border-radius:10px;border-left:3px solid #00d9ff}
.rt{font-size:12px;color:#9ca3af;margin-bottom:8px;font-weight:600}
.tg{display:inline-block;padding:4px 8px;margin:2px;background:rgba(0,217,255,.1);color:#00d9ff;border-radius:6px;font-size:11px;border:1px solid rgba(0,217,255,.2)}
.sb{margin-top:10px;display:flex;align-items:center;gap:8px}
.sl{font-size:11px;color:#9ca3af;white-space:nowrap}
.br{flex:1;height:8px;background:#0a0e1a;border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .4s}
.sv{font-size:13px;font-weight:700;color:#00d9ff;min-width:32px;text-align:right}
.ct{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ic{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(0,217,255,.1);color:#00d9ff}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mi{background:#111827;padding:14px 10px;border-radius:10px;text-align:center}
.mv{font-size:20px;font-weight:700;margin-bottom:4px}
.ml{font-size:11px;color:#9ca3af}
.p{color:#10b981}.n{color:#ef4444}.u{color:#00d9ff}.w{color:#f59e0b}
.ch{position:relative;height:220px;margin-top:6px}
.ft{text-align:center;padding:16px;color:#9ca3af;font-size:10px}
.ec{text-align:center;padding:30px;color:#9ca3af;font-size:14px}
.rb{padding:6px 16px;border-radius:6px;border:1px solid #00d9ff;background:rgba(0,217,255,.1);color:#00d9ff;font-size:12px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="c">
<div class="h"><h1>📈 纳指加仓模型</h1><p>实时数据 · 浏览器计算 · 日期查询</p></div>
<div class="st" id="st"><span class="l">⏳ 获取数据中...</span></div>
<div class="ds" id="ds" style="display:none">
<button class="nb" id="pb">◀</button>
<div class="dw"><input type="date" id="di"></div>
<button class="nb" id="nb">▶</button>
</div>
<div class="di" id="di2"></div>
<div id="ca"><div class="cd ec"><div style="font-size:32px">📡</div><div>连接数据源...</div></div></div>
<div class="ft">仅供参考，不构成投资建议 · ← → 键盘翻页</div>
</div>
<script>
const API='https://query1.finance.yahoo.com/v8/finance/chart/%5EIXIC?interval=1d&range=2y';
let D=[],A={},L=[],C=null,cd=null;

function sa(id,h){document.getElementById(id).innerHTML=h}
function ge(id){return document.getElementById(id)}

async function ld(){
 sa('st','<span class="l">⏳ 获取数据...</span>');
 try{
  const r=await fetch(API);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  const R=j.chart.result[0];
  const ts=R.timestamp,q=R.indicators.quote[0];
  D=[];
  for(let i=0;i<ts.length;i++)if(q.close[i]!==null)D.push({d:new Date(ts[i]*1e3).toISOString().split('T')[0],c:q.close[i]});
  calc();
  sa('st','<span class="k">✓ 已更新 '+D.length+' 个交易日</span>');
  ui();
 }catch(e){sa('st','<span class="o">✗ 失败: '+e.message+'</span>');err()}
}

function calc(){
 const n=D.length,c=D.map(x=>x.c);
 const sma=(p)=>{const r=[];for(let i=0;i<n;i++){if(i<p-1){r.push(null);continue}let s=0;for(let j=0;j<p;j++)s+=c[i-j];r.push(s/p)}return r};
 const m20=sma(20),m60=sma(60),m120=sma(120);
 
 const rsi=(()=>{const r=[],g=[],l=[];for(let i=0;i<n;i++){if(!i){r.push(50);g.push(0);l.push(0);continue}const ch=c[i]-c[i-1];g.push(ch>0?ch:0);l.push(ch<0?-ch:0);if(i<14){r.push(50);continue}let sg=0,sl=0;for(let j=i-13;j<=i;j++){sg+=g[j];sl+=l[j]}r.push(sl===0?100:100-100/(1+sg/sl))}return r})();
 
 const r60=(()=>{const r=[];for(let i=0;i<n;i++){let mx=c[i];for(let j=Math.max(0,i-59);j<=i;j++)if(c[j]>mx)mx=c[j];r.push((c[i]-mx)/mx*100)}return r})();
 
 const d120=c.map((x,i)=>!m120[i]?0:(x-m120[i])/m120[i]*100);
 
 const ret=c.map((x,i)=>!i?0:(x-c[i-1])/c[i-1]);
 const vol=(()=>{const r=[];for(let i=0;i<n;i++){if(i<19){r.push(NaN);continue}let s=0;for(let j=i-19;j<=i;j++)s+=ret[j];const m=s/20;let v=0;for(let j=i-19;j<=i;j++)v+=(ret[j]-m)**2;r.push(Math.sqrt(v/20)*Math.sqrt(252)*100)}return r})();
 
 A={};L=[];
 for(let i=0;i<n;i++){
  let sc=0,sg=[];
  const dd=r60[i];
  if(dd<=-20){sc+=4;sg.push(`极度回撤 ${dd.toFixed(1)}%`)}
  else if(dd<=-15){sc+=3;sg.push(`深度回撤 ${dd.toFixed(1)}%`)}
  else if(dd<=-10){sc+=2;sg.push(`中度回撤 ${dd.toFixed(1)}%`)}
  else if(dd<=-7){sc+=1;sg.push(`轻度回撤 ${dd.toFixed(1)}%`)}
  
  const rv=rsi[i];
  if(rv<20){sc+=2;sg.push(`RSI极度超卖 ${rv.toFixed(0)}`)}
  else if(rv<30){sc+=1;sg.push(`RSI超卖 ${rv.toFixed(0)}`)}
  
  const md=d120[i];
  if(md<-15){sc+=2;sg.push(`严重偏离120日均线 ${md.toFixed(1)}%`)}
  else if(md<-10){sc+=1;sg.push(`偏离120日均线 ${md.toFixed(1)}%`)}
  
  if(i>=252){let mn=c[i],mx=c[i];for(let j=i-252;j<i;j++){if(c[j]<mn)mn=c[j];if(c[j]>mx)mx=c[j]}if(mx>mn){const p=(c[i]-mn)/(mx-mn)*100;if(p<20){sc+=1;sg.push('价格处于20%分位')}}}
  
  if(i>=60&&!isNaN(vol[i])){let a=0;for(let j=i-60;j<i;j++)a+=isNaN(vol[j])?0:vol[j];a/=60;if(a>0&&vol[i]>a*2){sc+=1;sg.push(`恐慌性波动 ${vol[i].toFixed(1)}%`)}}
  
  let ac,lv,re;
  if(sc>=7){ac='ADD3';lv=3;re='强烈建议加仓'}
  else if(sc>=5){ac='ADD2';lv=2;re='建议加仓'}
  else if(sc>=3){ac='ADD1';lv=1;re='轻度加仓'}
  else if(sc>=1&&dd<=-5){ac='ADD0';lv=0;re='定投机会'}
  else{ac='HOLD';lv=-1;re='持有观望'}
  
  A[D[i].d]={dt:D[i].d,pr:c[i],dd:dd,rs:rv,d120:md,vl:vol[i],m20:m20[i],m60:m60[i],m120:m120[i],sc:sc,sg:sg,lv:lv,re:re};
  L.push(D[i].d);
 }
}

function ui(){
 ge('ds').style.display='flex';
 const inp=ge('di');
 inp.min=L[0];inp.max=L[L.length-1];
 cd=L[L.length-1];inp.value=cd;
 show(cd);
 
 inp.addEventListener('change',e=>{
  const v=e.target.value;
  if(A[v]){cd=v;show(v)}
  else{const t=new Date(v);let cl=L[0],md=1e14;for(const d of L){const df=Math.abs(new Date(d)-t);if(df<md){md=df;cl=d}}cd=cl;inp.value=cl;show(cl)}
 });
 
 ge('pb').addEventListener('click',()=>nav(-1));
 ge('nb').addEventListener('click',()=>nav(1));
 document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1)});
}

function nav(d){
 const i=L.indexOf(cd);
 if(i<0)return;
 const ni=i+d;
 if(ni>=0&&ni<L.length){cd=L[ni];ge('di').value=cd;show(cd)}
}

function show(d){
 const a=A[d];if(!a)return;
 const o=new Date(d+'T00:00:00'),wd=['周日','周一','周二','周三','周四','周五','周六'];
 const isL=d===L[L.length-1];
 sa('di2',d+' '+wd[o.getDay()]+(isL?' <span style="color:#10b981">● 最新</span>':''));
 
 const i=L.indexOf(d);
 let ch='';
 if(i>0){const p=A[L[i-1]];if(p){const c=((a.pr-p.pr)/p.pr*100);ch='<span class="'+(c>=0?'p':'n')+'">'+(c>=0?'▲':'▼')+' '+Math.abs(c).toFixed(2)+'%</span>'}}
 
 let sg='';
 if(a.sg&&a.sg.length){
  const cl=['#10b981','#f59e0b','#f97316','#ef4444'];
  const co=a.sc>0?cl[Math.min(a.lv,3)]:'#374151';
  sg='<div class="sr"><div class="rt">📊 触发信号</div>'+a.sg.map(x=>'<span class="tg">'+x+'</span>').join('')+'<div class="sb"><span class="sl">信号强度</span><div class="br"><div class="bf" style="width:'+(a.sc/10*100)+'%;background:'+co+'"></div></div><span class="sv">'+a.sc+'/10</span></div></div>';
 }
 
 const fm=(v)=>v===null||v===undefined||isNaN(v)?'--':((v>0?'+':'')+v.toFixed(2));
 const cc=(v,f)=>v===null||isNaN(v)?'u':f(v);
 
 sa('ca','<div class="cd"><div class="cp"><div class="pv">'+a.pr.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div><div class="pl">纳斯达克综合指数 (IXIC)</div><div class="pc">'+ch+'</div></div><div class="rc r'+Math.max(a.lv,0)+'">'+a.re+'</div>'+sg+'</div><div class="cd"><div class="ct"><div class="ic">📊</div>关键指标</div><div class="mg"><div class="mi"><div class="mv '+cc(a.dd,v=>v<=-10?'n':(v<=-5?'w':'p'))+'">'+fm(a.dd)+'%</div><div class="ml">60日高点回撤</div></div><div class="mi"><div class="mv '+cc(a.rs,v=>v<30?'n':(v>70?'w':'u'))+'">'+fm(a.rs)+'</div><div class="ml">RSI (14日)</div></div><div class="mi"><div class="mv '+cc(a.d120,v=>v<-10?'n':(v<0?'w':'p'))+'">'+fm(a.d120)+'%</div><div class="ml">120日均线偏离</div></div><div class="mi"><div class="mv '+cc(a.vl,v=>v>40?'n':(v>25?'w':'u'))+'">'+fm(a.vl)+'%</div><div class="ml">年化波动率</div></div></div></div><div class="cd"><div class="ct"><div class="ic" style="background:rgba(16,185,129,0.1);color:#10b981">📉</div>近期走势</div><div class="ch"><canvas id="pc"></canvas></div></div>');
 
 chart(d);
}

function chart(cd){
 const x=ge('pc').getContext('2d');
 if(C)C.destroy();
 const ci=L.indexOf(cd),si=Math.max(0,ci-30),ei=Math.min(L.length-1,ci+3);
 const sl=L.slice(si,ei+1),ds=sl.map(d=>d.slice(5)),ps=sl.map(d=>A[d].pr),dd=sl.map(d=>A[d].dd||0);
 const pt=sl.map(d=>d===cd?5:0),pc=sl.map(d=>d===cd?'#fff':'transparent');
 C=new Chart(x,{type:'line',data:{labels:ds,datasets:[{label:'纳指',data:ps,borderColor:'#00d9ff',backgroundColor:(c)=>{const g=c.chart.ctx.createLinearGradient(0,0,0,220);g.addColorStop(0,'rgba(0,217,255,0.15)');g.addColorStop(1,'rgba(0,217,255,0)');return g},borderWidth:2,fill:true,tension:.3,pointRadius:pt,pointBackgroundColor:pc,pointBorderColor:'#00d9ff',pointBorderWidth:2,yAxisID:'y'},{label:'回撤%',data:dd,borderColor:'#ef4444',backgroundColor:'transparent',borderWidth:1,borderDash:[4,4],pointRadius:0,tension:.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#9ca3af',font:{size:11},usePointStyle:true}},tooltip:{backgroundColor:'rgba(17,24,39,.95)',titleColor:'#f3f4f6',bodyColor:'#9ca3af',borderColor:'#374151',borderWidth:1,padding:10,callbacks:{title:(t)=>sl[t[0].dataIndex]}}},scales:{x:{grid:{color:'#374151',drawBorder:false},ticks:{color:'#9ca3af',font:{size:10},maxTicksLimit:8}},y:{type:'linear',display:true,position:'left',grid:{color:'#374151',drawBorder:false},ticks:{color:'#9ca3af',font:{size:10}}},y1:{type:'linear',display:true,position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ef4444',font:{size:10}}}}}});
}

function err(){
 sa('ca','<div class="cd ec"><div style="font-size:32px">⚠️</div><div style="margin:8px 0">数据获取失败</div><div style="font-size:12px;color:#9ca3af;margin-bottom:12px">Yahoo Finance 连接问题，请检查网络</div><button class="rb" onclick="ld()">🔄 重试</button></div>');
}

document.addEventListener('DOMContentLoaded',ld);
</script>
</body>
</html>
