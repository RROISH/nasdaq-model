<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>纳指买卖模型 V8终极版 | 大周期跟随策略</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #333;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1a1a2e; margin-bottom: 5px; font-size: 24px; }
        .subtitle { 
            text-align: center; color: #64748b; font-size: 12px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 2px 8px; border-radius: 12px;
            font-size: 10px; font-weight: bold;
        }
        .date-control {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 20px; background: #f0f4f8; padding: 10px; border-radius: 12px;
        }
        .nav-btn {
            width: 40px; height: 40px; border: none; background: #16213e; color: white;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:active { transform: scale(0.95); }
        input[type="date"] {
            padding: 8px 12px; border: 2px solid #16213e; border-radius: 8px;
            font-size: 16px; background: white;
        }
        .position-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: white;
            margin-bottom: 20px; text-align: center;
        }
        .position-label { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
        .position-value { font-size: 64px; font-weight: bold; margin: 10px 0; }
        .position-bar-bg {
            width: 100%; height: 24px; background: rgba(255,255,255,0.3);
            border-radius: 12px; overflow: hidden; margin: 15px 0;
        }
        .position-bar-fill {
            height: 100%; background: white; border-radius: 12px;
            transition: width 0.5s ease;
        }
        .signal-card {
            padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 20px;
            color: white;
        }
        .signal-strong-buy { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .signal-buy { background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%); }
        .signal-accumulate { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .signal-hold { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .signal-reduce { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #333; }
        .signal-sell { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .signal-strong-sell { background: linear-gradient(135deg, #8e0e00 0%, #1f1c18 100%); }
        .signal-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .components-section {
            background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }
        .components-title { font-size: 16px; font-weight: bold; color: #1a1a2e; margin-bottom: 15px; text-align: center; }
        .component-row {
            display: flex; align-items: center; margin-bottom: 12px;
            padding: 10px; background: white; border-radius: 10px;
        }
        .component-icon { width: 30px; font-size: 20px; text-align: center; }
        .component-name { flex: 1; font-size: 14px; color: #475569; }
        .component-value { font-size: 16px; font-weight: bold; min-width: 50px; text-align: right; }
        .component-bar { width: 60px; height: 6px; background: #e2e8f0; border-radius: 3px; margin-left: 10px; overflow: hidden; }
        .component-fill { height: 100%; border-radius: 3px; }
        .metrics-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px;
        }
        .metric-card {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .metric-label { font-size: 11px; color: #64748b; margin-bottom: 5px; }
        .metric-value { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .chart-container {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; height: 300px; position: relative;
        }
        .info-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px; border-radius: 12px; margin-top: 20px;
        }
        .info-title { font-size: 14px; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; }
        .info-text { font-size: 12px; color: #475569; line-height: 1.6; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 12px; text-align: center; margin: 20px 0; }
        .last-update { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 纳指买卖模型 V8</h1>
        <div class="subtitle">
            <span class="badge">终极版</span>
            <span>大周期跟随策略 | 200日均线基础仓位</span>
        </div>
        
        <div class="date-control">
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
            <input type="date" id="dateInput" onchange="loadData()">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
        </div>
        
        <div id="content"><div class="loading">加载中...</div></div>
        
        <div class="last-update" id="lastUpdate"></div>
    </div>

    <script>
        const CACHE_BUSTER = '?_=' + new Date().getTime();
        let currentData = null, availableDates = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDataFile();
            if (availableDates.length > 0) {
                document.getElementById('dateInput').value = availableDates[availableDates.length - 1];
                loadData();
            }
        });
        
        async function loadDataFile() {
            try {
                const response = await fetch('data/nasdaq_data.json' + CACHE_BUSTER, {cache: 'no-store'});
                if (!response.ok) throw new Error('HTTP ' + response.status);
                currentData = await response.json();
                availableDates = Object.keys(currentData.daily_data || {}).sort();
                const updateTime = currentData.last_update ? new Date(currentData.last_update).toLocaleString('zh-CN') : '未知';
                document.getElementById('lastUpdate').textContent = '模型: ' + (currentData.model_name || 'V8终极版') + ' | 更新: ' + updateTime;
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="error">数据加载失败</div>';
            }
        }
        
        function changeDate(days) {
            const current = document.getElementById('dateInput').value;
            if (!current) return;
            const idx = availableDates.indexOf(current);
            const newIdx = idx + days;
            if (newIdx >= 0 && newIdx < availableDates.length) {
                document.getElementById('dateInput').value = availableDates[newIdx];
                loadData();
            }
        }
        
        function loadData() {
            const date = document.getElementById('dateInput').value;
            if (!date || !currentData) return;
            const dayData = currentData.daily_data[date];
            if (!dayData) {
                document.getElementById('content').innerHTML = '<div class="error">该日期暂无数据</div>';
                return;
            }
            renderContent(dayData, date);
        }
        
        function getSignalClass(score) {
            if (score >= 85) return 'signal-strong-buy';
            if (score >= 70) return 'signal-buy';
            if (score >= 55) return 'signal-accumulate';
            if (score >= 40) return 'signal-hold';
            if (score >= 25) return 'signal-reduce';
            if (score >= 10) return 'signal-sell';
            return 'signal-strong-sell';
        }
        
        function renderContent(data, date) {
            const score = data.score;
            const targetPos = data.target_position || (score / 100);
            const signalClass = getSignalClass(score);
            const components = data.components || {};
            const details = data.details || {};
            
            document.getElementById('content').innerHTML = `
                <div class="position-card">
                    <div class="position-label">💡 建议仓位</div>
                    <div class="position-value">${(targetPos * 100).toFixed(0)}%</div>
                    <div class="position-bar-bg">
                        <div class="position-bar-fill" style="width: ${targetPos * 100}%"></div>
                    </div>
                    <div style="font-size: 13px; opacity: 0.9;">基于大周期基础仓位 + 多维度动态调整</div>
                </div>
                
                <div class="signal-card ${signalClass}">
                    <div class="signal-title">${data.signal}</div>
                    <div>${data.signal_desc}</div>
                </div>
                
                <div class="components-section">
                    <div class="components-title">📊 仓位组成分解</div>
                    <div class="component-row">
                        <div class="component-icon">🏛️</div>
                        <div class="component-name">基础仓位（200日均线）</div>
                        <div class="component-value">${(components.base * 100).toFixed(0)}%</div>
                        <div class="component-bar"><div class="component-fill" style="width: ${components.base / 0.9 * 100}%; background: #3498db"></div></div>
                    </div>
                    <div class="component-row">
                        <div class="component-icon">📈</div>
                        <div class="component-name">趋势调整（50/200金叉）</div>
                        <div class="component-value" style="color: ${components.trend >= 0 ? '#10b981' : '#ef4444'}">${components.trend >= 0 ? '+' : ''}${(components.trend * 100).toFixed(0)}%</div>
                        <div class="component-bar"><div class="component-fill" style="width: ${Math.abs(components.trend) / 0.15 * 100}%; background: ${components.trend >= 0 ? '#10b981' : '#ef4444'}"></div></div>
                    </div>
                    <div class="component-row">
                        <div class="component-icon">😱</div>
                        <div class="component-name">恐慌调整（VIX极端值）</div>
                        <div class="component-value" style="color: ${components.panic >= 0 ? '#f59e0b' : '#8b5cf6'}">${components.panic >= 0 ? '+' : ''}${(components.panic * 100).toFixed(0)}%</div>
                        <div class="component-bar"><div class="component-fill" style="width: ${Math.abs(components.panic) / 0.20 * 100}%; background: #f59e0b"></div></div>
                    </div>
                    <div class="component-row">
                        <div class="component-icon">💎</div>
                        <div class="component-name">估值微调（极端位置）</div>
                        <div class="component-value" style="color: ${components.value >= 0 ? '#10b981' : '#ef4444'}">${components.value >= 0 ? '+' : ''}${(components.value * 100).toFixed(0)}%</div>
                        <div class="component-bar"><div class="component-fill" style="width: ${Math.abs(components.value) / 0.10 * 100}%; background: ${components.value >= 0 ? '#10b981' : '#ef4444'}"></div></div>
                    </div>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">纳指收盘</div>
                        <div class="metric-value">${data.price.toFixed(2)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">VIX恐慌指数</div>
                        <div class="metric-value">${data.vix.toFixed(2)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">200日均线距离</div>
                        <div class="metric-value">${data.ma200_distance > 0 ? '+' : ''}${data.ma200_distance.toFixed(1)}%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">52周位置</div>
                        <div class="metric-value">${details.position_52w ? details.position_52w.toFixed(0) : '--'}%</div>
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="info-title">ℹ️ V8模型逻辑</div>
                    <div class="info-text">
                        <strong>大周期跟随策略：</strong><br>
                        ① 基础仓位由200日均线决定（20%-90%）<br>
                        ② 50/200日均线金叉/死叉调整±15%<br>
                        ③ VIX极端值（>45或<12）触发±20%调整<br>
                        ④ 仅在高/低位极端估值时微调±10%<br>
                        <strong>核心优势：</strong>牛市不轻易下车，熊市有效避险
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
