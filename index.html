<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纳指模型 - 2026-04-15</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; background: white; border-radius: 10px; padding: 20px; }
        h1 { text-align: center; color: #333; font-size: 24px; }
        .date { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .signal { font-size: 36px; font-weight: bold; text-align: center; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .signal-green { background: #4CAF50; color: white; }
        .signal-red { background: #f44336; color: white; }
        .signal-orange { background: #FF9800; color: white; }
        .score { text-align: center; font-size: 16px; color: #666; margin-bottom: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .data-label { color: #666; }
        .data-value { font-weight: bold; color: #333; }
        .green { color: #4CAF50; }
        .red { color: #f44336; }
        .advice { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .advice h3 { margin-top: 0; color: #333; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 纳指交易模型</h1>
        <div class="date">2026-04-15 更新</div>
        <div class="signal signal-red">卖出</div>
        <div class="score">模型评分: -2 / -5~+5</div>
        <div class="data-row">
            <span class="data-label">纳指收盘</span>
            <span class="data-value">24016.02</span>
        </div>
        <div class="data-row">
            <span class="data-label">涨跌幅</span>
            <span class="data-value green">1.59%</span>
        </div>
        <div class="data-row">
            <span class="data-label">VIX恐慌指数</span>
            <span class="data-value">18.12</span>
        </div>
        <div class="data-row">
            <span class="data-label">vs 50日均线</span>
            <span class="data-value green">6.72%</span>
        </div>
        <div class="data-row">
            <span class="data-label">52周位置</span>
            <span class="data-value">100.0%</span>
        </div>
        <div class="advice">
            <h3>💡 操作建议</h3>
            <p>市场高位，建议分批减仓</p>
        </div>
        <div class="footer">数据延迟15分钟 | 仅供参考</div>
    </div>
</body>
</html>
