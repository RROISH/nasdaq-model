<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纳指买卖模型 v3.0 | 三维度优化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 5px; font-size: 24px; }
        .subtitle { text-align: center; color: #64748b; font-size: 12px; margin-bottom: 20px; }
        
        .date-control {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 20px; background: #f0f4f8; padding: 10px; border-radius: 12px;
        }
        .nav-btn {
            width: 40px; height: 40px; border: none; background: #2a5298; color: white;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .nav-btn:active { transform: scale(0.95); background: #1e3c72; }
        input[type="date"] {
            padding: 8px 12px; border: 2px solid #2a5298; border-radius: 8px;
            font-size: 16px; background: white;
        }
        
        /* 信号卡片 */
        .signal-card {
            padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: white;
            transition: all 0.3s;
        }
        .signal-strong-buy { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .signal-buy { background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%); }
        .signal-accumulate { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .signal-hold { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .signal-reduce { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #333; }
        .signal-sell { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .signal-strong-sell { background: linear-gradient(135deg, #8e0e00 0%, #1f1c18 100%); }
        
        .signal-emoji { font-size: 48px; margin-bottom: 10px; }
        .signal-title { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .signal-desc { font-size: 14px; opacity: 0.95; }
        
        /* 综合评分 */
        .score-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
            color: white; text-align: center;
        }
        .score-title { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
        .score-number { font-size: 56px; font-weight: bold; margin: 10px 0; }
        .score-bar-bg {
            width: 100%; height: 20px; background: rgba(255,255,255,0.3);
            border-radius: 10px; overflow: hidden; margin-top: 10px;
        }
        .score-bar-fill {
            height: 100%; background: white; border-radius: 10px;
            transition: width 0.5s ease; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        /* 三维度评分 */
        .dimensions {
            background: #f8fafc; padding: 20px; border-radius: 16px;
            margin-bottom: 20px;
        }
        .dimensions-title {
            font-size: 16px; font-weight: bold; color: #1e3c72;
            margin-bottom: 15px; text-align: center;
        }
        .dimension-row {
            display: flex; align-items: center; margin-bottom: 8px;
        }
        .dimension-label {
            width: 80px; font-size: 14px; color: #64748b; font-weight: 500;
        }
        .dimension-bar {
            flex: 1; height: 28px; background: #e2e8f0;
            border-radius: 14px; overflow: hidden; position: relative;
            margin: 0 10px;
        }
        .dimension-fill {
            height: 100%; border-radius: 14px;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 10px; color: white; font-size: 13px; font-weight: bold;
            transition: width 0.5s ease;
        }
        .dim-valuation { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); }
        .dim-fear { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); }
        .dim-trend { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); }
        .dimension-value { width: 40px; text-align: right; font-weight: bold; color: #1e293b; font-size: 14px; }
        .dimension-sub {
            text-align: right; font-size: 11px; color: #94a3b8; margin-bottom: 12px; padding-left: 90px;
        }
        
        /* 市场数据 */
        .metrics-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            border-left: 4px solid #2a5298;
        }
        .metric-label { font-size: 12px; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        .metric-value { font-size: 20px; font-weight: bold; color: #1e293b; }
        .metric-sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        
        /* 图表 */
        .chart-container {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; height: 280px; position: relative;
        }
        .chart-title { font-size: 14px; color: #64748b; margin-bottom: 10px; text-align: center; }
        canvas { width: 100%; height: 220px; }
        
        /* 统计 */
        .stats-section {
            background: #f0f4f8; padding: 15px; border-radius: 12px; margin-top: 20px;
        }
        .stats-title { font-size: 14px; font-weight: bold; color: #1e3c72; margin-bottom: 10px; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;
        }
        .stat-item { font-size: 11px; }
        .stat-count { font-size: 16px; font-weight: bold; color: #2a5298; }
        .stat-label { color: #64748b; font-size: 10px; }
        
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 12px; text-align: center; margin: 20px 0; }
        .last-update { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 20px; }
        
        @media (max-width: 480px) {
            .container { padding: 15px; }
            h1 { font-size: 20px; }
            .signal-title { font-size: 24px; }
            .score-number { font-size: 48px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 纳指买卖模型 v3.0</h1>
        <div class="subtitle">三维度优化版 | 估值40% + 恐慌35% + 趋势25%</div>
        
        <div class="date-control">
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
            <input type="date" id="dateInput" onchange="loadData()">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
        </div>
        
        <div id="content"><div class="loading">加载中...</div></div>
        
        <div class="last-update" id="lastUpdate"></div>
    </div>

    <script>
        let currentData = null;
        let availableDates = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDataFile();
            if (availableDates.length > 0) {
                document.getElementById('dateInput').value = availableDates[availableDates.length - 1];
                loadData();
            }
        });
        
        async function loadDataFile() {
            try {
                const response = await fetch('data/nasdaq_data.json?t=' + Date.now());
                if (!response.ok) throw new Error('加载失败');
                currentData = await response.json();
                availableDates = Object.keys(currentData.daily_data || {}).sort();
                const updateTime = currentData.last_update ? new Date(currentData.last_update).toLocaleString('zh-CN') : '未知';
                document.getElementById('lastUpdate').textContent = '数据更新时间: ' + updateTime;
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">数据加载失败，请刷新页面重试</div>';
            }
        }
        
        function changeDate(days) {
            const current = document.getElementById('dateInput').value;
            if (!current || availableDates.length === 0) return;
            const idx = availableDates.indexOf(current);
            if (idx === -1) return;
            const newIdx = idx + days;
            if (newIdx >= 0 && newIdx < availableDates.length) {
                document.getElementById('dateInput').value = availableDates[newIdx];
                loadData();
            }
        }
        
        function loadData() {
            const date = document.getElementById('dateInput').value;
            if (!date || !currentData) return;
            
            const dayData = currentData.daily_data[date];
            if (!dayData) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">该日期暂无数据</div>';
                return;
            }
            
            renderContent(dayData, date);
        }
        
        function getSignalClass(score) {
            if (score >= 90) return 'signal-strong-buy';
            if (score >= 75) return 'signal-buy';
            if (score >= 60) return 'signal-accumulate';
            if (score >= 40) return 'signal-hold';
            if (score >= 25) return 'signal-reduce';
            if (score >= 10) return 'signal-sell';
            return 'signal-strong-sell';
        }
        
        function getSignalEmoji(score) {
            if (score >= 90) return '🔥';
            if (score >= 75) return '📈';
            if (score >= 60) return '💰';
            if (score >= 40) return '⏸️';
            if (score >= 25) return '⚠️';
            if (score >= 10) return '📉';
            return '🚨';
        }
        
        function renderContent(data, date) {
            const score = data.score;
            const signalClass = getSignalClass(score);
            const emoji = getSignalEmoji(score);
            const details = data.details || {};
            
            const content = `
                <div class="signal-card ${signalClass}">
                    <div class="signal-emoji">${emoji}</div>
                    <div class="signal-title">${data.signal}</div>
                    <div class="signal-desc">${data.signal_desc}</div>
                </div>
                
                <div class="score-section">
                    <div class="score-title">三维度综合评分</div>
                    <div class="score-number">${score}</div>
                    <div class="score-bar-bg">
                        <div class="score-bar-fill" style="width: ${score}%"></div>
                    </div>
                </div>
                
                <div class="dimensions">
                    <div class="dimensions-title">📊 三维度评分详情</div>
                    
                    <div class="dimension-row">
                        <div class="dimension-label">估值维度</div>
                        <div class="dimension-bar">
                            <div class="dimension-fill dim-valuation" style="width: ${(details.valuation || 0) / 40 * 100}%">${details.valuation || 0}</div>
                        </div>
                        <div class="dimension-value">/40</div>
                    </div>
                    <div class="dimension-sub">52周位置: ${details.position_52w !== undefined ? details.position_52w : '--'}%</div>
                    
                    <div class="dimension-row">
                        <div class="dimension-label">恐慌维度</div>
                        <div class="dimension-bar">
                            <div class="dimension-fill dim-fear" style="width: ${(details.fear || 0) / 35 * 100}%">${details.fear || 0}</div>
                        </div>
                        <div class="dimension-value">/35</div>
                    </div>
                    <div class="dimension-sub">VIX指数: ${data.vix ? data.vix.toFixed(2) : '--'}</div>
                    
                    <div class="dimension-row">
                        <div class="dimension-label">趋势维度</div>
                        <div class="dimension-bar">
                            <div class="dimension-fill dim-trend" style="width: ${(details.trend || 0) / 25 * 100}%">${details.trend || 0}</div>
                        </div>
                        <div class="dimension-value">/25</div>
                    </div>
                    <div class="dimension-sub">距200日均线: ${data.ma200_distance > 0 ? '+' : ''}${data.ma200_distance ? data.ma200_distance.toFixed(1) : '--'}%</div>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">纳指收盘</div>
                        <div class="metric-value">${data.price.toFixed(2)}</div>
                        <div class="metric-sub ${data.change >= 0 ? 'positive' : 'negative'}">
                            ${data.change >= 0 ? '↑' : '↓'} ${Math.abs(data.change_percent).toFixed(2)}%
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">VIX恐慌指数</div>
                        <div class="metric-value">${data.vix.toFixed(2)}</div>
                        <div class="metric-sub">${data.vix > 35 ? '极度恐慌' : data.vix > 25 ? '恐慌' : data.vix > 15 ? '正常' : '低迷'}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">200日均线</div>
                        <div class="metric-value">${data.ma200 ? data.ma200.toFixed(0) : '--'}</div>
                        <div class="metric-sub">偏离: ${data.ma200_distance > 0 ? '+' : ''}${data.ma200_distance.toFixed(1)}%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">52周位置</div>
                        <div class="metric-value">${details.position_52w !== undefined ? details.position_52w + '%' : '--'}</div>
                        <div class="metric-sub">${details.position_52w > 90 ? '历史高位' : details.position_52w < 10 ? '历史低位' : '中间位置'}</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title">近一年评分走势与信号分布</div>
                    <canvas id="scoreChart"></canvas>
                </div>
                
                <div class="stats-section">
                    <div class="stats-title">📈 今年信号统计</div>
                    <div class="stats-grid" id="statsGrid">计算中...</div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = content;
            
            setTimeout(() => {
                drawChart(date);
                calculateStats();
            }, 100);
        }
        
        function drawChart(currentDate) {
            const canvas = document.getElementById('scoreChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            
            const width = rect.width;
            const height = rect.height;
            
            const endIdx = availableDates.indexOf(currentDate);
            const startIdx = Math.max(0, endIdx - 250);
            const dates = availableDates.slice(startIdx, endIdx + 1);
            
            if (dates.length < 2) return;
            
            const scores = dates.map(d => currentData.daily_data[d].score);
            
            ctx.clearRect(0, 0, width, height);
            
            // 绘制评分区域
            ctx.beginPath();
            ctx.fillStyle = 'rgba(102, 126, 234, 0.2)';
            dates.forEach((date, i) => {
                const x = (i / (dates.length - 1)) * width;
                const y = height - (scores[i] / 100) * height * 0.8 - height * 0.1;
                if (i === 0) ctx.moveTo(x, height);
                ctx.lineTo(x, y);
                if (i === dates.length - 1) {
                    ctx.lineTo(x, height);
                    ctx.closePath();
                }
            });
            ctx.fill();
            
            // 绘制评分线
            ctx.beginPath();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            dates.forEach((date, i) => {
                const x = (i / (dates.length - 1)) * width;
                const y = height - (scores[i] / 100) * height * 0.8 - height * 0.1;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // 标记当前点
            const currIdx = dates.indexOf(currentDate);
            if (currIdx >= 0) {
                const x = (currIdx / (dates.length - 1)) * width;
                const y = height - (scores[currIdx] / 100) * height * 0.8 - height * 0.1;
                ctx.beginPath();
                ctx.fillStyle = '#f59e0b';
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 标记买卖信号点
            dates.forEach((date, i) => {
                const d = currentData.daily_data[date];
                if (d.score >= 75 || d.score <= 25) {
                    const x = (i / (dates.length - 1)) * width;
                    const y = height - (d.score / 100) * height * 0.8 - height * 0.1;
                    ctx.beginPath();
                    ctx.fillStyle = d.score >= 75 ? '#10b981' : '#ef4444';
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function calculateStats() {
            const year = new Date().getFullYear().toString();
            const yearData = Object.entries(currentData.daily_data || {})
                .filter(([date]) => date.startsWith(year))
                .map(([_, data]) => data);
            
            const stats = {
                '强烈买入': yearData.filter(d => d.score >= 90).length,
                '买入': yearData.filter(d => d.score >= 75 && d.score < 90).length,
                '定投': yearData.filter(d => d.score >= 60 && d.score < 75).length,
                '持有': yearData.filter(d => d.score >= 40 && d.score < 60).length,
                '减仓/卖出': yearData.filter(d => d.score < 40).length
            };
            
            const html = Object.entries(stats).map(([label, count]) => `
                <div class="stat-item">
                    <div class="stat-count">${count}</div>
                    <div class="stat-label">${label}</div>
                </div>
            `).join('');
            
            const el = document.getElementById('statsGrid');
            if (el) el.innerHTML = html;
        }
        
        window.addEventListener('resize', () => {
            const date = document.getElementById('dateInput').value;
            if (date) drawChart(date);
        });
    </script>
</body>
</html>
